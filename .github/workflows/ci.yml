name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Nightly fuzz smoke (Linux libFuzzer + sanitizers).
    - cron: "0 3 * * *"
  workflow_dispatch:

defaults:
  run:
    working-directory: crates

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Unix KEM seed mode hardening
        run: |
          cargo test -p aegis-node --lib kem_external_file_has_restrictive_mode_on_unix -- --nocapture
          cargo test -p aegis-node --lib kem_seed_file_rejects_group_world_readable_mode -- --nocapture

  sim-pytest:
    name: sim pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install sim test deps
        run: pip install -r sim/requirements.txt
      - name: Run sim pytest
        working-directory: sim
        env:
          PYTHONPATH: .
        run: pytest tests/ -q

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Policy check
        run: cargo deny check

  fuzz-smoke:
    name: cargo-fuzz smoke (fuzz_link_open)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates
            crates/aegis-crypto/fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz fuzz_link_open (30s)
        working-directory: crates/aegis-crypto/fuzz
        run: cargo +nightly fuzz run fuzz_link_open -- -max_total_time=30
