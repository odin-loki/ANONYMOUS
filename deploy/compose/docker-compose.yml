# AEGIS 4-relay operator pilot on a Docker bridge network.
# Generate bridge configs first: see docs/ops/PILOT.md § Docker pilot.
#
#   docker compose -f deploy/compose/docker-compose.yml up --build
#   docker compose -f deploy/compose/docker-compose.yml --profile client run --rm client

name: aegis-pilot

services:
  node0:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    command: ["--config", "/config/node0.toml"]
    volumes:
      - ./pilot_configs:/config
    networks:
      - aegis-pilot

  node1:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    command: ["--config", "/config/node1.toml"]
    volumes:
      - ./pilot_configs:/config
    networks:
      - aegis-pilot

  node2:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    command: ["--config", "/config/node2.toml"]
    volumes:
      - ./pilot_configs:/config
    networks:
      - aegis-pilot

  node3:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    command: ["--config", "/config/node3.toml"]
    volumes:
      - ./pilot_configs:/config
    networks:
      - aegis-pilot

  client:
    profiles: ["client"]
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    entrypoint: ["aegis-client"]
    command:
      - "--config"
      - "/config/client.toml"
      - "--payload"
      - "docker-pilot"
      - "--cover-secs"
      - "2"
      - "--tau-secs"
      - "0.35"
    volumes:
      - ./pilot_configs:/config
    depends_on:
      - node0
      - node1
      - node2
      - node3
    networks:
      - aegis-pilot

networks:
  aegis-pilot:
    driver: bridge
